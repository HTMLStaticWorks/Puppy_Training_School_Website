<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Puppy Training School</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body class="auth-page">
    
    <div class="auth-box animate-fade-in">
        <div class="auth-header">
            <a href="index.html" class="nav-logo justify-content-center mb-4">
                <i class="fa-solid fa-paw"></i> PuppySchool
            </a>
            <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Create Account</h1>
            <p class="text-secondary">Start your puppy's transformation today.</p>
        </div>

        <div class="auth-card">
            <form>
                <div class="form-group mb-4">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="form-group mb-4">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="mb-4">
                    <label style="display: flex; align-items: start; gap: 12px; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;">
                        <input type="checkbox" required style="margin-top: 4px; border-radius: 4px; accent-color: var(--primary);">
                        <span>I accept the <a href="#" style="color: var(--primary); font-weight: 500;">Terms</a> and <a href="#" style="color: var(--primary); font-weight: 500;">Privacy Policy</a>.</span>
                    </label>
                </div>

                <div class="mb-5 mt-2">
                    <button type="button" class="btn btn-primary btn-lg w-100">Sign Up</button>
                </div>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="d-flex flex-column gap-3 mb-4">
                    <button type="button" class="social-auth-btn">
                        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google" style="width: 20px; height: 20px;">
                        Continue with Google
                    </button>
                    <button type="button" class="social-auth-btn">
                        <i class="fa-brands fa-apple" style="font-size: 20px;"></i>
                        Continue with Apple
                    </button>
                </div>

                <div class="text-center mt-5 pt-3" style="border-top: 1px solid var(--border-color);">
                    <p class="text-secondary mb-0">
                        Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Log in here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
