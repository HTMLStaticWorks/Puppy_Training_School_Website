<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Puppy Training School</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    
    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000;">
        <button id="theme-toggle" class="theme-toggle-btn glass-card" style="padding: 12px; border-radius: 50%;" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon dark-icon"></i>
            <i class="fa-solid fa-sun light-icon"></i>
        </button>
    </div>

    <main class="flex-grow-1 d-flex align-items-center" style="padding: 60px 0;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 animate-fade-in">
                    
                    <div class="text-center mb-4">
                        <a href="index.html" class="nav-logo justify-content-center mb-3" style="font-size: 2rem;">
                            <i class="fa-solid fa-paw"></i> PuppySchool
                        </a>
                        <p class="text-secondary">Create an account to track your puppy's progress.</p>
                    </div>

                    <div class="glass-card" style="padding: 3rem;">
                        <form>
                            <div class="row">
                                <div class="col-sm-6 form-group mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" placeholder="John" required>
                                </div>
                                <div class="col-sm-6 form-group mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" placeholder="Doe" required>
                                </div>
                            </div>
                            <div class="form-group mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="form-group mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="form-group mb-4">
                                <label style="display: flex; align-items: start; gap: 10px; font-size: 0.875rem; color: var(--text-secondary); cursor: pointer;">
                                    <input type="checkbox" required style="margin-top: 4px;">
                                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
                                </label>
                            </div>
                            
                            <button type="button" class="btn btn-primary w-100 mb-4" style="padding: 14px;">Create Account</button>
                            
                            <div class="text-center text-secondary mb-4 position-relative">
                                <hr style="border-color: var(--border-color); margin: 1.5rem 0;">
                                <span class="position-absolute top-50 start-50 translate-middle px-3 py-1 bg-light-alt" style="font-size: 0.875rem; background: var(--surface-color);">or sign up with</span>
                            </div>

                            <button type="button" class="btn btn-outline w-100" style="padding: 12px; border-color: var(--border-color); color: var(--text-primary);">
                                <i class="fa-brands fa-google me-2" style="color: #DB4437;"></i> Google
                            </button>
                        </form>
                    </div>

                    <div class="text-center mt-4">
                        <p class="text-secondary">Already have an account? <a href="login.html" style="font-weight: 600;">Log in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
