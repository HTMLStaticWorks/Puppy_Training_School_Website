<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--bg-color);">
    
    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000;">
        <button id="theme-toggle" class="theme-toggle-btn glass-card" style="padding: 12px; border-radius: 50%;" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon dark-icon"></i>
            <i class="fa-solid fa-sun light-icon"></i>
        </button>
    </div>

    <div class="container text-center text-center">
        <h1 style="font-size: 8rem; color: var(--primary); line-height: 1; margin-bottom: 0;">404</h1>
        <h2 style="font-size: 2.5rem; margin-bottom: 24px;">Oops! Dog ate this page.</h2>
        <p style="font-size: 1.1rem; color: var(--text-secondary); max-width: 500px; margin: 0 auto 32px;">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        
        <a href="index.html" class="btn btn-primary" style="padding: 14px 32px; font-size: 1.1rem;"><i class="fa-solid fa-arrow-left me-2"></i> Back to Homepage</a>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
