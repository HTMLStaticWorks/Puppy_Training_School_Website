<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Puppy Training School</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body class="auth-page">

    <div class="auth-box animate-fade-in">
        <div class="auth-header">
            <a href="index.html" class="nav-logo justify-content-center mb-4">
                <i class="fa-solid fa-paw"></i> PuppySchool
            </a>
            <h1 style="font-size: 2.25rem; margin-bottom: 0.5rem;">Welcome Back</h1>
            <p class="text-secondary">Please enter your details to sign in.</p>
        </div>

        <div class="auth-card">
            <form>
                <div class="form-group mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com"
                        style="padding: 14px; border-radius: 12px;" required>
                </div>

                <div class="form-group mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label mb-0">Password</label>
                        <a href="#" style="font-size: 0.9rem; font-weight: 500; color: var(--primary);">Forgot
                            password?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••"
                        style="padding: 14px; border-radius: 12px;" required>
                </div>

                <div class="mb-4">
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 0.95rem; color: var(--text-secondary); cursor: pointer;">
                        <input type="checkbox" id="rememberMe"
                            style="width: 18px; height: 18px; border-radius: 4px; accent-color: var(--primary);">
                        <span>Remember me</span>
                    </label>
                </div>

                <div class="text-center mb-5 mt-2">
                    <button type="button" class="btn btn-primary"
                        style="padding: 16px 40px; border-radius: 12px; font-size: 1.1rem; min-width: 220px;">Sign
                        In</button>
                </div>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="text-center mb-4">
                    <button type="button" class="social-auth-btn"
                        style="width: auto; display: inline-flex; min-width: 220px; margin: 0 auto;">
                        <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" alt="Google"
                            style="width: 20px; height: 20px;">
                        Google Account
                    </button>
                </div>

            </form>
        </div>

        <p class="text-center text-secondary mt-5">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up for
                free</a>
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
